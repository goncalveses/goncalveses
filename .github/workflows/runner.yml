name: Outrun the AI

on:
  issues:
    types: [opened]

# Serialize moves so two players never push at the same time
concurrency:
  group: runner-game
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  move:
    # Only react to issues created by the game controls
    if: startsWith(github.event.issue.title, 'play|')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply move
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_ACTOR: ${{ github.event.issue.user.login }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node game/runner.js

      - name: Commit scene
        run: |
          git config user.name "Esdras Gonçalves"
          git config user.email "32415522+goncalveses@users.noreply.github.com"
          git add README.md game/state.json
          git commit -m "🤖 outrun-the-ai: move by @${{ github.event.issue.user.login }}" || echo "nothing to commit"
          git push

      - name: Close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh issue close ${{ github.event.issue.number }}
          -c "🤖 Move applied! See the updated scene on the profile README. Thanks for playing, @${{ github.event.issue.user.login }}! Tap another control to keep going."
